+name: Build Artifact
+
+on:
+  push:
+    branches:
+      - main
+  workflow_dispatch:
+
+jobs:
+  package:
+    runs-on: ubuntu-latest
+
+    steps:
+      - name: Checkout code
+        uses: actions/checkout@v5
+
+      - name: Create release folder
+        run: |
+          mkdir -p release
+          rsync -av \
+            --exclude='.git' \
+            --exclude='.github' \
+            --exclude='node_modules' \
+            --exclude='vendor' \
+            ./ release/
+
+      - name: Zip project
+        run: |
+          cd release
+          zip -r ../expense-tracker.zip .
+
+      - name: Upload artifact
+        uses: actions/upload-artifact@v4
+        with:
+          name: expense-tracker
+          path: expense-tracker.zip
+          retention-days: 7
